<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusAI - Multi-Domain Expert System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Landing Page View -->
        <div id="landing-view" class="view active">
            <header class="hero">
                <h1 class="animated-heading"><span class="gradient-text">Nexus</span>AI</h1>
                <p class="subtitle">Multi-Domain Expert System</p>
                <p class="description">Select a specialized AI mode to begin.</p>
            </header>
            
            <main>
                <div id="mode-grid" class="grid-container">
                    <!-- Cards will be injected by JS -->
                </div>
            </main>
        </div>

        <!-- Chat View -->
        <div id="chat-view" class="view">
            <header class="chat-header">
                <button id="back-btn" class="icon-btn" aria-label="Go back">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <div class="chat-header-info">
                    <div id="chat-icon-container" class="icon-container">
                        <i id="chat-icon" class="fa-solid fa-robot"></i>
                    </div>
                    <div>
                        <h2 id="chat-title">Mode Name</h2>
                        <p id="chat-subtitle">Persona description</p>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="messages-container">
                <!-- Messages will appear here -->
                <div id="welcome-message-container"></div>
            </div>

            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="message-input" placeholder="Type your message..." rows="1"></textarea>
                    <button id="send-btn" class="icon-btn send-btn" aria-label="Send message">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
